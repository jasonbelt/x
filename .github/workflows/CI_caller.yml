on:
  push:
  workflow_dispatch:

jobs:
  linux:
    uses: ./.github/workflows/CI_linux.yml
    with: 
      username: 'blah-${{github.run_id}}'
  mac:
    uses: ./.github/workflows/CI-macOS.yml
  win:
    uses: ./.github/workflows/CI-windows.yml
  
  updateRepo:
    runs-on: ubuntu-latest
    needs: [linux, mac, win]
    steps: 
      - name: Checkout
        uses: actions/checkout@v4
      - name: Update
        run: |
          echo "Welcome to the updater"
          echo "run number is $GITHUB_RUN_NUMBER"
